name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - main
  schedule:
    # Lane lourde hebdomadaire : lundi 06:00 UTC.
    - cron: "0 6 * * 1"

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # LANE RAPIDE — déclenchée à chaque push/PR.
  # Pas de deps lourdes (dlib/portaudio/opencv). ruff + import-linter +
  # mypy-conformité + pytest unit + snapshot-routes diff.
  # ───────────────────────────────────────────────────────────────────────────
  fast:
    name: Lane rapide (ruff + import-linter + mypy + unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      # Installe uniquement le groupe dev (ruff, pytest, import-linter, mypy)
      # — pas le projet ni les deps lourdes. Suffisant pour les gates de cette lane.
      - name: Install dev tools
        run: uv sync --frozen --no-install-project --group dev

      - name: Ruff
        run: uv run ruff check

      - name: Import-linter (contrat de couches CDC §F.1.1)
        run: uv run lint-imports

      - name: Mypy (conformité Protocols, CDC §F.1.3bis)
        run: uv run mypy

      - name: Unit tests (sans deps lourdes ni intégration)
        # `pytest -m "not integration"` — les tests qui ont besoin de deps
        # lourdes (livekit, sounddevice, opencv chargé en bg) sont marqués
        # `@pytest.mark.integration` et exclus ici.
        run: uv run pytest -m "not integration" -q

      - name: Snapshot routes — diff vs baseline
        # Routes byte-identiques à la baseline — gate inchangé depuis B.
        # Skip si le projet n'est pas installé (ce qui est le cas ici).
        run: |
          uv sync --frozen --group dev
          uv run python scripts/migration/snapshot_routes.py > /tmp/routes.now.txt
          diff scripts/migration/routes.baseline.txt /tmp/routes.now.txt

  # ───────────────────────────────────────────────────────────────────────────
  # LANE COMPLÈTE — main + scheduled hebdo + déclenchement manuel.
  # Deps lourdes (cmake/openblas/portaudio/libgl1) installées, suite full.
  # ───────────────────────────────────────────────────────────────────────────
  full:
    name: Lane complète (deps lourdes + pytest full)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      # dlib (face-recognition) : sdist uniquement, nécessite cmake + openblas.
      # pyaudio (RealtimeSTT)   : sdist uniquement, nécessite portaudio headers.
      # libgl1                  : opencv runtime.
      - name: System dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            libopenblas-dev \
            liblapack-dev \
            portaudio19-dev \
            libgl1 \
            python3-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies (full)
        run: uv sync --frozen --group dev

      - name: Pytest (suite complète, incl. integration)
        run: uv run pytest -q
